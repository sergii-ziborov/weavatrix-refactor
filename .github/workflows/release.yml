name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run verify:release
      - run: npm test
      - run: npm audit
      - run: npm pack --dry-run --json

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - name: Publish npm package with provenance
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "weavatrix-refactor@$VERSION" version >/dev/null 2>&1; then
            echo "weavatrix-refactor@$VERSION is already published"
          else
            npm publish --ignore-scripts --provenance --access public
          fi

          PUBLISHED_HEAD=""
          PREDICATE=""
          for attempt in $(seq 1 24); do
            PUBLISHED_HEAD="$(npm view "weavatrix-refactor@$VERSION" gitHead --json 2>/dev/null | tr -d '\"\r\n' || true)"
            PREDICATE="$(npm view "weavatrix-refactor@$VERSION" dist.attestations.provenance.predicateType --json 2>/dev/null | tr -d '\"\r\n' || true)"
            if [[ "$PUBLISHED_HEAD" == "$GITHUB_SHA" && "$PREDICATE" == "https://slsa.dev/provenance/v1" ]]; then
              break
            fi
            echo "Waiting for npm registry consistency (attempt $attempt/24)"
            sleep 5
          done
          [[ "$PUBLISHED_HEAD" == "$GITHUB_SHA" ]] || { echo "npm gitHead $PUBLISHED_HEAD does not match tag commit $GITHUB_SHA" >&2; exit 1; }
          [[ "$PREDICATE" == "https://slsa.dev/provenance/v1" ]] || { echo "npm provenance attestation is missing" >&2; exit 1; }
      - name: Install verified MCP Registry publisher
        shell: bash
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz
          echo "1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf  mcp-publisher.tar.gz" | sha256sum --check
          tar --extract --gzip --file mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
      - name: Publish server metadata to the official MCP Registry
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REGISTRY_RESPONSE="$(curl --fail --silent --show-error 'https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.sergii-ziborov%2Fweavatrix-refactor')"
          if jq --exit-status --arg version "$VERSION" \
            '.servers[]?.server | select(.name == "io.github.sergii-ziborov/weavatrix-refactor" and .version == $version)' \
            <<<"$REGISTRY_RESPONSE" >/dev/null; then
            echo "MCP Registry already contains Weavatrix Refactor $VERSION; skipping publish"
          else
            ./mcp-publisher login github-oidc
            ./mcp-publisher publish
          fi

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --notes-file "docs/releases/$GITHUB_REF_NAME.md" --latest
          RELEASE_IMMUTABLE="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" --jq .immutable)"
          [[ "$RELEASE_IMMUTABLE" == "true" ]] || { echo "GitHub release is not immutable" >&2; exit 1; }
