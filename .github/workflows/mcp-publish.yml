name: Publish MCP metadata

# Publishes server.json to the official MCP Registry independently of the npm release job.
# Used when the npm package is already on npm (e.g. a bootstrap publish) and only the
# registry entry is missing. Authenticates via GitHub Actions OIDC, which proves ownership
# of the io.github.<owner> namespace; the npm link is proven by the mcpName field in the
# already-published package.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install verified MCP Registry publisher
        shell: bash
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz
          echo "1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf  mcp-publisher.tar.gz" | sha256sum --check
          tar --extract --gzip --file mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
      - name: Publish server metadata to the official MCP Registry
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          REGISTRY_RESPONSE="$(curl --fail --silent --show-error 'https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.sergii-ziborov%2Fweavatrix-refactor')"
          if jq --exit-status --arg version "$VERSION" \
            '.servers[]?.server | select(.name == "io.github.sergii-ziborov/weavatrix-refactor" and .version == $version)' \
            <<<"$REGISTRY_RESPONSE" >/dev/null; then
            echo "MCP Registry already contains Weavatrix Refactor $VERSION; skipping publish"
          else
            ./mcp-publisher login github-oidc
            ./mcp-publisher publish
          fi
